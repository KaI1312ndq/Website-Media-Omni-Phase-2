<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Media Omni</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<style>
.an { max-width: 1100px; margin: 0 auto; padding: 88px 20px 80px; }

/* ── FILTERS ── */
.an-filters {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  background: var(--paper); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 18px; margin-bottom: 28px;
}
.an-filters label { font-size: .78rem; font-weight: 600; color: var(--muted); margin-right: 4px; }
.an-sel {
  padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .84rem; font-family: var(--f-body); background: #fff; color: var(--ink);
  cursor: pointer; outline: none;
}
.an-sel:focus { border-color: var(--blue); }
.filter-brand-wrap { position: relative; }
.brand-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
  background: #fff; border: 1.5px solid var(--border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12); min-width: 200px; max-height: 260px;
  overflow-y: auto; display: none; flex-direction: column; padding: 6px;
}
.brand-dropdown.open { display: flex; }
.brand-dd-search {
  padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 7px;
  font-size: .83rem; font-family: var(--f-body); margin-bottom: 5px; outline: none;
}
.brand-dd-search:focus { border-color: var(--blue); }
.brand-dd-opt {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  border-radius: 6px; cursor: pointer; font-size: .84rem; user-select: none;
}
.brand-dd-opt:hover { background: var(--paper2); }
.brand-dd-opt input[type=checkbox] { accent-color: var(--blue); width: 14px; height: 14px; }
.brand-tag-list { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; min-height: 32px; }
.brand-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--paper2); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 10px; font-size: .78rem; font-weight: 600; color: var(--blue);
}
.brand-tag-all { color: var(--muted); }
.brand-tag-rm { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; font-size: .9rem; line-height: 1; }
.filter-refresh { margin-left: auto; }

/* ── COVERAGE CARDS ── */
.an-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
@media(max-width:700px){ .an-cards { grid-template-columns: repeat(2,1fr); } }
.an-card {
  background: #fff; border: 1.5px solid var(--border); border-radius: 14px;
  padding: 18px 20px; display: flex; flex-direction: column; gap: 4px;
}
.an-card-val { font-family: var(--f-display); font-size: 2rem; font-weight: 800; color: var(--ink); line-height: 1.1; }
.an-card-lbl { font-size: .78rem; color: var(--muted); font-weight: 500; }
.an-card-sub { font-size: .75rem; color: var(--faint); margin-top: 2px; }
.an-card.ok  .an-card-val { color: var(--success); }
.an-card.warn .an-card-val { color: var(--warning); }
.an-card.err  .an-card-val { color: var(--error); }

/* ── SECTION TITLE ── */
.an-sec { margin-bottom: 10px; }
.an-sec h2 { font-family: var(--f-display); font-size: 1rem; font-weight: 700; color: var(--ink); }
.an-sec p  { font-size: .8rem; color: var(--muted); margin-top: 2px; }
.an-block { background: #fff; border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 28px; }

/* ── STATUS MATRIX ── */
.matrix-wrap { overflow-x: auto; }
.matrix-tbl { width: 100%; border-collapse: collapse; font-size: .83rem; }
.matrix-tbl th {
  padding: 9px 14px; background: #f8faff; font-weight: 700; font-family: var(--f-display);
  font-size: .75rem; color: var(--muted); text-align: center; border-bottom: 1.5px solid var(--border);
  white-space: nowrap;
}
.matrix-tbl th:first-child { text-align: left; }
.matrix-tbl td { padding: 9px 14px; border-bottom: 1px solid var(--border2); text-align: center; }
.matrix-tbl td:first-child { text-align: left; font-weight: 600; color: var(--ink); white-space: nowrap; }
.matrix-tbl tr:last-child td { border-bottom: none; }
.matrix-tbl tr:hover td { background: var(--paper); }
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%; font-size: .85rem;
}
.badge-ok   { background: #d1fae5; }
.badge-miss { background: #fee2e2; }
.badge-none { background: var(--paper); color: var(--faint); }
.plan-badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: .72rem; font-weight: 700;
}
.plan-yes { background: #d1fae5; color: #065f46; }
.plan-no  { background: #fee2e2; color: #991b1b; }

/* ── TIMING TABLE ── */
.timing-tbl { width: 100%; border-collapse: collapse; font-size: .83rem; }
.timing-tbl th {
  padding: 9px 14px; background: #f8faff; font-weight: 700; font-size: .75rem;
  color: var(--muted); text-align: center; border-bottom: 1.5px solid var(--border); white-space: nowrap;
}
.timing-tbl th:first-child { text-align: left; }
.timing-tbl td { padding: 8px 14px; border-bottom: 1px solid var(--border2); text-align: center; font-family: var(--f-mono); font-size: .78rem; color: var(--muted); }
.timing-tbl td:first-child { text-align: left; font-weight: 600; color: var(--ink); font-family: var(--f-body); }
.timing-tbl tr:last-child td { border-bottom: none; }
.timing-tbl tr:hover td { background: var(--paper); }
.t-day { font-size: .7rem; color: var(--faint); display: block; }

/* ── METRICS TABLE ── */
.metrics-tbl { width: 100%; border-collapse: collapse; font-size: .83rem; }
.metrics-tbl th {
  padding: 9px 14px; background: #f8faff; font-weight: 700; font-size: .75rem;
  color: var(--muted); border-bottom: 1.5px solid var(--border); white-space: nowrap; text-align: right;
}
.metrics-tbl th:first-child { text-align: left; }
.metrics-tbl td { padding: 8px 14px; border-bottom: 1px solid var(--border2); text-align: right; font-family: var(--f-mono); font-size: .81rem; }
.metrics-tbl td:first-child { text-align: left; font-weight: 600; color: var(--ink); font-family: var(--f-body); }
.metrics-tbl tr:last-child td { border-bottom: none; }
.metrics-tbl tr:hover td { background: var(--paper); }
.pct-good { color: var(--success); font-weight: 700; }
.pct-warn { color: var(--warning); font-weight: 700; }
.pct-bad  { color: var(--error); font-weight: 700; }
.pct-none { color: var(--faint); }

/* ── CHART ── */
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
@media(max-width:700px){ .chart-row { grid-template-columns: 1fr; } }
.chart-box { background: #fff; border: 1.5px solid var(--border); border-radius: 14px; padding: 20px; }
.chart-box h3 { font-family: var(--f-display); font-size: .9rem; font-weight: 700; margin-bottom: 14px; color: var(--ink); }

/* ── LOADING ── */
.an-loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: .9rem; }
.spin { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-row td { text-align: center !important; color: var(--faint); font-style: italic; padding: 20px !important; font-family: var(--f-body) !important; }
</style>
</head>
<body>
<div id="sp"></div>
<div class="an" id="app">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
    <a href="/dashboard.html" style="font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:4px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
  </div>
  <div style="margin-bottom:28px">
    <h1 style="font-family:var(--f-display);font-size:1.6rem;font-weight:800;color:var(--ink)">Analytics</h1>
    <p style="color:var(--muted);font-size:.88rem;margin-top:4px">Tổng quan hiệu suất, tiến độ report và số liệu theo brand.</p>
  </div>

  <!-- FILTERS -->
  <div class="an-filters">
    <div>
      <label>Tháng</label>
      <select class="an-sel" id="sel-month"></select>
    </div>
    <div>
      <label>Năm</label>
      <select class="an-sel" id="sel-year"></select>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <label>Brand</label>
      <div class="filter-brand-wrap" id="brand-filter-wrap">
        <div class="brand-tag-list" id="brand-tag-list" onclick="toggleBrandDD()" style="cursor:pointer;min-width:140px;padding:4px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff"></div>
        <div class="brand-dropdown" id="brand-dd">
          <input class="brand-dd-search" id="brand-dd-search" placeholder="Tìm brand..." oninput="filterBrandDD(this.value)" onclick="event.stopPropagation()">
          <div id="brand-dd-list"></div>
        </div>
      </div>
    </div>
    <button class="an-sel filter-refresh" onclick="loadData()" style="background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;display:inline-flex;align-items:center;gap:6px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Tải dữ liệu
    </button>
  </div>

  <div id="main-content">
    <div class="an-loading"><div class="spin"></div><br><br>Đang tải dữ liệu...</div>
  </div>
</div>

<div id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="/js/shared.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbwmLt2SFY5iMg22qrUmvxmgI5Njwje5wRYGdHIwxizQvELMAHKmVlahHj0XJVOMuYMu/exec';

// ── STATE ──
let ALL_BRANDS = [];
let SELECTED_BRANDS = []; // empty = all
let DATA = {}; // { brand: { plan, history, weeks } }
let CHART_GMV = null, CHART_CP = null;
let CU = null;

// ── FETCH WITH TIMEOUT ──
async function apiFetch(url, timeoutMs = 15000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    return await r.json();
  } catch(e) {
    clearTimeout(tid);
    if (e.name === 'AbortError') throw new Error('Timeout');
    throw e;
  }
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  CU = Auth.get();
  if (!CU) { try { CU = JSON.parse(localStorage.getItem('mo_persist')); } catch {} }
  if (!CU) { location.href = '/'; return; }
  localStorage.setItem('mo_persist', JSON.stringify(CU));
  Auth.set(CU);

  initFilters();
  const ok = await fetchBrands();
  if (ok !== false) loadData();
  document.addEventListener('click', e => {
    if (!document.getElementById('brand-filter-wrap').contains(e.target))
      document.getElementById('brand-dd').classList.remove('open');
  });
});

function initFilters() {
  const now = new Date();
  const selM = document.getElementById('sel-month');
  const selY = document.getElementById('sel-year');
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = `Tháng ${m}`;
    if (m === now.getMonth() + 1) o.selected = true;
    selM.appendChild(o);
  }
  for (let y = 2024; y <= now.getFullYear() + 1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === now.getFullYear()) o.selected = true;
    selY.appendChild(o);
  }
}

async function fetchBrands() {
  try {
    const j = await apiFetch(`${API}?action=getBrands`);
    ALL_BRANDS = (j.ok && j.data) ? j.data : [];
  } catch(e) {
    ALL_BRANDS = [];
    document.getElementById('main-content').innerHTML =
      `<div class="an-loading">❌ Không thể kết nối API.<br><span style="font-size:.8rem;color:var(--faint)">${e.message}</span><br><br><button class="an-sel" onclick="location.reload()" style="margin-top:8px">Thử lại</button></div>`;
    return false;
  }
  buildBrandDD();
  renderBrandTags();
  return true;
}

function buildBrandDD() {
  const list = document.getElementById('brand-dd-list');
  list.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'brand-dd-opt';
  all.innerHTML = `<input type="checkbox" id="chk-brand-all"> <label for="chk-brand-all" style="cursor:pointer">Tất cả</label>`;
  all.querySelector('input').checked = SELECTED_BRANDS.length === 0;
  all.querySelector('input').onchange = e => {
    if (e.target.checked) { SELECTED_BRANDS = []; renderBrandTags(); syncBrandChecks(); }
  };
  list.appendChild(all);
  ALL_BRANDS.forEach(b => {
    const d = document.createElement('div');
    d.className = 'brand-dd-opt';
    d.dataset.brand = b;
    d.innerHTML = `<input type="checkbox" id="chk-brand-${b}"> <label for="chk-brand-${b}" style="cursor:pointer">${b}</label>`;
    d.querySelector('input').checked = SELECTED_BRANDS.includes(b);
    d.querySelector('input').onchange = e => {
      if (e.target.checked) { if (!SELECTED_BRANDS.includes(b)) SELECTED_BRANDS.push(b); }
      else { SELECTED_BRANDS = SELECTED_BRANDS.filter(x => x !== b); }
      renderBrandTags(); syncBrandChecks();
    };
    list.appendChild(d);
  });
}

function syncBrandChecks() {
  document.querySelectorAll('#brand-dd-list .brand-dd-opt input').forEach(inp => {
    const b = inp.closest('[data-brand]')?.dataset.brand;
    if (b) inp.checked = SELECTED_BRANDS.includes(b);
  });
  const allChk = document.querySelector('#brand-dd-list #chk-brand-all');
  if (allChk) allChk.checked = SELECTED_BRANDS.length === 0;
}

function filterBrandDD(q) {
  document.querySelectorAll('#brand-dd-list .brand-dd-opt[data-brand]').forEach(d => {
    d.style.display = d.dataset.brand.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function renderBrandTags() {
  const el = document.getElementById('brand-tag-list');
  if (SELECTED_BRANDS.length === 0) {
    el.innerHTML = `<span class="brand-tag brand-tag-all">Tất cả</span>`;
  } else {
    el.innerHTML = SELECTED_BRANDS.map(b =>
      `<span class="brand-tag">${b}<button class="brand-tag-rm" onclick="removeBrandFilter('${b}',event)">×</button></span>`
    ).join('');
  }
}

function removeBrandFilter(b, e) {
  e.stopPropagation();
  SELECTED_BRANDS = SELECTED_BRANDS.filter(x => x !== b);
  renderBrandTags(); syncBrandChecks();
}

function toggleBrandDD() {
  document.getElementById('brand-dd').classList.toggle('open');
  if (document.getElementById('brand-dd').classList.contains('open'))
    document.getElementById('brand-dd-search').focus();
}

// ── LOAD DATA ──
async function loadData() {
  const month = parseInt(document.getElementById('sel-month').value);
  const year  = parseInt(document.getElementById('sel-year').value);
  const brands = SELECTED_BRANDS.length > 0 ? SELECTED_BRANDS : ALL_BRANDS;

  if (!brands.length) {
    document.getElementById('main-content').innerHTML =
      `<div class="an-loading">Không có brand nào. Kiểm tra kết nối API hoặc <button class="an-sel" onclick="location.reload()" style="margin-top:8px">Tải lại trang</button></div>`;
    return;
  }

  document.getElementById('main-content').innerHTML =
    `<div class="an-loading"><div class="spin"></div><br><br>Đang tải dữ liệu ${brands.length} brand...</div>`;

  DATA = {};
  const weeks = getWeeksOfMonth(year, month);

  try {
    await Promise.all(brands.map(async brand => {
      const [pj, hj] = await Promise.all([
        apiFetch(`${API}?action=getPlan&brand_name=${encodeURIComponent(brand)}&month=${month}&year=${year}`).catch(()=>({ok:false})),
        apiFetch(`${API}?action=getWeeklyHistory&brand_name=${encodeURIComponent(brand)}&month=${month}&year=${year}`).catch(()=>({ok:false}))
      ]);
      DATA[brand] = {
        plan:    pj.ok ? pj.data : null,
        history: hj.ok ? (hj.data || []) : [],
        weeks
      };
    }));
    render(brands, month, year, weeks);
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="an-loading">❌ Lỗi tải dữ liệu: ${e.message}<br><br><button class="an-sel" onclick="loadData()" style="margin-top:8px">Thử lại</button></div>`;
  }
}

// ── WEEK UTILS ──
function getWeeksOfMonth(year, month) {
  const weeks = [];
  let d = new Date(year, month - 1, 1);
  let w = 1;
  while (d.getMonth() === month - 1) {
    const start = new Date(d);
    let end = new Date(d);
    while (end.getMonth() === month - 1 && end.getDay() !== 0) end.setDate(end.getDate() + 1);
    if (end.getMonth() !== month - 1) end.setDate(end.getDate() - 1);
    weeks.push({ w, start, end });
    end.setDate(end.getDate() + 1);
    d = new Date(end);
    w++;
  }
  return weeks;
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return '—';
  return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

function fmtDay(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  const days = ['CN','T2','T3','T4','T5','T6','T7'];
  return days[dt.getDay()];
}

function fmtNum(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const n = Math.round(parseFloat(v));
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e4) return Math.round(n/1e3)+'K';
  return n.toLocaleString('en-US');
}

function pctColor(pct) {
  if (pct === null || pct === undefined) return 'pct-none';
  if (pct >= 100) return 'pct-good';
  if (pct >= 70)  return 'pct-warn';
  return 'pct-bad';
}

// ── RENDER ──
function render(brands, month, year, weeks) {
  const wNums = weeks.map(w => w.w);

  // ── computed per brand ──
  const bData = brands.map(brand => {
    const { plan, history } = DATA[brand];
    const hasPlan = !!plan;
    const weekMap = {};
    (history || []).forEach(h => { weekMap[parseInt(h.week_num)] = h; });

    const gmvTotal = wNums.reduce((a, w) => {
      const h = weekMap[w];
      if (!h) return a;
      return a + (parseFloat(h.s_cpc_doanh_so||0)+parseFloat(h.s_nd_gmv||0)+parseFloat(h.s_live_gmv||0)+parseFloat(h.t_pgm_doanh_so||0)+parseFloat(h.t_lgm_doanhthu||0));
    }, 0);
    const cpTotal = wNums.reduce((a, w) => {
      const h = weekMap[w];
      if (!h) return a;
      return a + (parseFloat(h.s_cpc_chi_phi||0)+parseFloat(h.s_nd_chi_phi||0)+parseFloat(h.s_live_chi_phi||0)+parseFloat(h.t_pgm_chi_phi||0)+parseFloat(h.t_lgm_chi_phi||0)+parseFloat(h.t_con_chi_phi||0)+parseFloat(h.t_brd_chi_phi||0));
    }, 0);
    const roas = cpTotal > 0 ? gmvTotal / cpTotal : null;

    const planGmv = plan ? (
      (parseFloat(plan.s_cpc_doanh_so?.plan_month||0)+parseFloat(plan.s_nd_gmv?.plan_month||0)+parseFloat(plan.s_live_gmv?.plan_month||0)+parseFloat(plan.t_pgm_doanh_so?.plan_month||0)+parseFloat(plan.t_lgm_doanhthu?.plan_month||0))
    ) : null;
    const planCp = plan ? (
      (parseFloat(plan.s_cpc_chi_phi?.plan_month||0)+parseFloat(plan.s_nd_chi_phi?.plan_month||0)+parseFloat(plan.s_live_chi_phi?.plan_month||0)+parseFloat(plan.t_pgm_chi_phi?.plan_month||0)+parseFloat(plan.t_lgm_chi_phi?.plan_month||0)+parseFloat(plan.t_con_chi_phi?.plan_month||0)+parseFloat(plan.t_brd_chi_phi?.plan_month||0))
    ) : null;

    const reportedWeeks = wNums.filter(w => weekMap[w]);
    const pctGmv = planGmv && gmvTotal ? Math.round(gmvTotal / planGmv * 100) : null;
    const pctCp  = planCp  && cpTotal  ? Math.round(cpTotal  / planCp  * 100) : null;

    return { brand, hasPlan, weekMap, gmvTotal, cpTotal, roas, planGmv, planCp, pctGmv, pctCp, reportedWeeks };
  });

  // ── coverage ──
  const totalBrands    = brands.length;
  const brandsWithPlan = bData.filter(d => d.hasPlan).length;
  const brandsWithAnyReport = bData.filter(d => d.reportedWeeks.length > 0).length;
  const currentWeek = getCurrentWeek(weeks);
  const brandsThisWeek = bData.filter(d => currentWeek && d.weekMap[currentWeek]).length;
  const missingThisWeek = totalBrands - brandsThisWeek;

  // ── render ──
  const html = `
    <!-- CARDS -->
    <div class="an-cards">
      <div class="an-card">
        <div class="an-card-val">${totalBrands}</div>
        <div class="an-card-lbl">Brand đang theo dõi</div>
        <div class="an-card-sub">Tháng ${month}/${year}</div>
      </div>
      <div class="an-card ${brandsWithPlan === totalBrands ? 'ok' : brandsWithPlan > 0 ? 'warn' : 'err'}">
        <div class="an-card-val">${brandsWithPlan}/${totalBrands}</div>
        <div class="an-card-lbl">Brand đã có Plan tháng</div>
        <div class="an-card-sub">${totalBrands - brandsWithPlan > 0 ? `Còn ${totalBrands - brandsWithPlan} chưa set plan` : 'Tất cả đã có plan ✓'}</div>
      </div>
      <div class="an-card ${brandsWithAnyReport === totalBrands ? 'ok' : brandsWithAnyReport > 0 ? 'warn' : 'err'}">
        <div class="an-card-val">${brandsWithAnyReport}/${totalBrands}</div>
        <div class="an-card-lbl">Brand đã nộp Report</div>
        <div class="an-card-sub">Ít nhất 1 tuần trong tháng</div>
      </div>
      <div class="an-card ${missingThisWeek === 0 ? 'ok' : 'err'}">
        <div class="an-card-val">${missingThisWeek}</div>
        <div class="an-card-lbl">Chưa nộp${currentWeek ? ` W${currentWeek}` : ''}</div>
        <div class="an-card-sub">${missingThisWeek > 0 ? bData.filter(d=>currentWeek&&!d.weekMap[currentWeek]).map(d=>d.brand).join(', ') : 'Đã đủ ✓'}</div>
      </div>
    </div>

    <!-- STATUS MATRIX -->
    <div class="an-sec"><h2>Trạng thái Report theo tuần</h2><p>✅ Đã nộp &nbsp; ❌ Chưa nộp &nbsp; — Tuần chưa đến</p></div>
    <div class="an-block">
      <div class="matrix-wrap">
        <table class="matrix-tbl">
          <thead><tr>
            <th>Brand</th>
            ${weeks.map(w=>`<th>W${w.w}<br><span style="font-weight:400;font-size:.7rem">${fmtShortDate(w.start)}–${fmtShortDate(w.end)}</span></th>`).join('')}
            <th>Plan?</th>
            <th>% nộp</th>
          </tr></thead>
          <tbody>
            ${bData.map(d => {
              const pctRpt = Math.round(d.reportedWeeks.length / weeks.length * 100);
              return `<tr>
                <td>${d.brand}</td>
                ${weeks.map(w => {
                  const has = !!d.weekMap[w.w];
                  const future = w.start > new Date();
                  return `<td>${future && !has ? '<span class="badge badge-none">–</span>' : has ? '<span class="badge badge-ok">✅</span>' : '<span class="badge badge-miss">❌</span>'}</td>`;
                }).join('')}
                <td><span class="plan-badge ${d.hasPlan?'plan-yes':'plan-no'}">${d.hasPlan?'Có':'Chưa có'}</span></td>
                <td><span class="${pctColor(pctRpt)}">${pctRpt}%</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- TIMING TABLE -->
    <div class="an-sec"><h2>Thời gian nộp Report</h2><p>Ngày giờ brand submit weekly report vào hệ thống</p></div>
    <div class="an-block">
      <div class="matrix-wrap">
        <table class="timing-tbl">
          <thead><tr>
            <th>Brand</th>
            ${weeks.map(w=>`<th>W${w.w}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${bData.map(d => `<tr>
              <td>${d.brand}</td>
              ${weeks.map(w => {
                const h = d.weekMap[w.w];
                if (!h) return `<td>—</td>`;
                const ts = h.created_at || h.updated_at || '';
                return `<td>${fmtDate(ts)}<span class="t-day">${fmtDay(ts)}</span></td>`;
              }).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- METRICS TABLE -->
    <div class="an-sec"><h2>Tổng hợp chỉ số theo Brand</h2><p>Lũy tiến MTD từ các tuần đã nộp</p></div>
    <div class="an-block">
      <div class="matrix-wrap">
        <table class="metrics-tbl">
          <thead><tr>
            <th>Brand</th>
            <th>Tuần gần nhất</th>
            <th>GMV Ads (MTD)</th>
            <th>Plan GMV</th>
            <th>% Plan GMV</th>
            <th>Chi phí (MTD)</th>
            <th>Plan CP</th>
            <th>% Plan CP</th>
            <th>ROAS/ROI</th>
          </tr></thead>
          <tbody>
            ${bData.length === 0 ? `<tr class="empty-row"><td colspan="9">Không có dữ liệu</td></tr>` :
              bData.map(d => {
                const lastW = d.reportedWeeks.length > 0 ? `W${Math.max(...d.reportedWeeks)}` : '—';
                return `<tr>
                  <td>${d.brand}</td>
                  <td>${lastW}</td>
                  <td>${fmtNum(d.gmvTotal)}</td>
                  <td>${d.planGmv ? fmtNum(d.planGmv) : '—'}</td>
                  <td><span class="${pctColor(d.pctGmv)}">${d.pctGmv !== null ? d.pctGmv+'%' : '—'}</span></td>
                  <td>${fmtNum(d.cpTotal)}</td>
                  <td>${d.planCp ? fmtNum(d.planCp) : '—'}</td>
                  <td><span class="${pctColor(d.pctCp)}">${d.pctCp !== null ? d.pctCp+'%' : '—'}</span></td>
                  <td>${d.roas !== null ? d.roas.toFixed(2)+'x' : '—'}</td>
                </tr>`;
              }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="chart-row">
      <div class="chart-box">
        <h3>GMV Ads theo tuần (MTD)</h3>
        <canvas id="chart-gmv" height="180"></canvas>
      </div>
      <div class="chart-box">
        <h3>Chi phí Ads theo tuần</h3>
        <canvas id="chart-cp" height="180"></canvas>
      </div>
    </div>
  `;

  document.getElementById('main-content').innerHTML = html;
  renderCharts(bData, weeks);
}

function getCurrentWeek(weeks) {
  const today = new Date();
  for (const w of weeks) {
    if (today >= w.start && today <= w.end) return w.w;
  }
  return weeks.length > 0 ? weeks[weeks.length - 1].w : null;
}

function fmtShortDate(d) {
  if (!d) return '';
  return `${d.getDate()}/${d.getMonth()+1}`;
}

// ── CHARTS ──
const COLORS = ['#2563EB','#06B6D4','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6'];

function renderCharts(bData, weeks) {
  if (CHART_GMV) { CHART_GMV.destroy(); CHART_GMV = null; }
  if (CHART_CP)  { CHART_CP.destroy();  CHART_CP = null; }

  const labels = weeks.map(w => `W${w.w}`);

  const gmvDatasets = bData.map((d, i) => ({
    label: d.brand,
    data: weeks.map(w => {
      const h = d.weekMap[w.w];
      if (!h) return 0;
      return parseFloat(h.s_cpc_doanh_so||0)+parseFloat(h.s_nd_gmv||0)+parseFloat(h.s_live_gmv||0)+parseFloat(h.t_pgm_doanh_so||0)+parseFloat(h.t_lgm_doanhthu||0);
    }),
    backgroundColor: COLORS[i % COLORS.length] + 'cc',
    borderColor: COLORS[i % COLORS.length],
    borderWidth: 1,
    borderRadius: 4,
  }));

  const cpDatasets = bData.map((d, i) => ({
    label: d.brand,
    data: weeks.map(w => {
      const h = d.weekMap[w.w];
      if (!h) return 0;
      return parseFloat(h.s_cpc_chi_phi||0)+parseFloat(h.s_nd_chi_phi||0)+parseFloat(h.s_live_chi_phi||0)+parseFloat(h.t_pgm_chi_phi||0)+parseFloat(h.t_lgm_chi_phi||0)+parseFloat(h.t_con_chi_phi||0)+parseFloat(h.t_brd_chi_phi||0);
    }),
    backgroundColor: COLORS[i % COLORS.length] + 'cc',
    borderColor: COLORS[i % COLORS.length],
    borderWidth: 1,
    borderRadius: 4,
  }));

  const chartOpts = (yLabel) => ({
    responsive: true,
    plugins: {
      legend: { position: 'bottom', labels: { font: { family: 'Be Vietnam Pro', size: 11 }, boxWidth: 12, padding: 12 } },
      tooltip: {
        callbacks: {
          label: ctx => `${ctx.dataset.label}: ${fmtNum(ctx.raw)}`
        }
      }
    },
    scales: {
      x: { stacked: true, grid: { display: false }, ticks: { font: { family: 'Roboto Mono', size: 11 } } },
      y: { stacked: true, grid: { color: 'rgba(37,99,235,.07)' }, ticks: { font: { family: 'Roboto Mono', size: 10 }, callback: v => fmtNum(v) } }
    }
  });

  CHART_GMV = new Chart(document.getElementById('chart-gmv'), { type: 'bar', data: { labels, datasets: gmvDatasets }, options: chartOpts('GMV') });
  CHART_CP  = new Chart(document.getElementById('chart-cp'),  { type: 'bar', data: { labels, datasets: cpDatasets  }, options: chartOpts('Chi phí') });
}
</script>
</body>
</html>
