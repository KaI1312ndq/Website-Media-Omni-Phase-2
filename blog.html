<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Media Omni</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%232563EB'/><stop offset='100%25' stop-color='%2306B6D4'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='56%25' dominant-baseline='central' text-anchor='middle' font-size='14' font-weight='900' fill='white' font-family='Arial'>B</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/css/blog.css">
</head>
<body>
<div id="sp"></div>

<nav id="main-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span class="nav-logo-mark">MO</span>MediaOmni</a>
    <div class="nav-links">
      <a href="/" class="nav-link">← Home</a>
      <a href="/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/admin.html" class="nav-link">CMS Admin</a>
    </div>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
  </div>
  <div class="nav-mob" id="nav-mob">
    <a href="/" class="nav-mob-link">← Home</a>
    <a href="/dashboard.html" class="nav-mob-link">Dashboard</a>
    <a href="/admin.html" class="nav-mob-link">CMS Admin</a>
  </div>
</nav>
<div class="mob-overlay" id="mob-overlay"></div>

<!-- LIST -->
<div id="list-page">
  <div class="blog-hdr rv">
    <div class="sec-label">Blog & Insights</div>
    <h1>Kiến thức thực chiến<br>từ Media Omni.</h1>
    <p>Case study, framework và playbook — chia sẻ để cùng grow.</p>
  </div>
  <div class="blog-controls rv d1">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="blog-search" id="blog-search" type="text" placeholder="Tìm bài viết..." oninput="filterPosts()">
    </div>
    <div class="tag-filters" id="tag-filters"></div>
  </div>
  <div class="blog-grid" id="blog-grid">
    <div class="blog-empty">⏳ Đang tải bài viết...</div>
  </div>
</div>

<!-- SINGLE POST -->
<div id="post-page">
  <button class="post-back" onclick="backToList()">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Quay lại tất cả bài
  </button>
  <div class="post-hdr">
    <div class="post-tag-row" id="post-tag-row"></div>
    <h1 class="post-title" id="post-title"></h1>
    <div class="post-meta-row">
      <span class="post-author" id="post-author"></span>
      <span id="post-date"></span>
      <span id="post-read"></span>
    </div>
  </div>
  <div class="post-thumb" id="post-thumb"></div>
  <div class="post-body" id="post-body"></div>
</div>

<div id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="/js/shared.js"></script>
<script src="/js/blog.js"></script>
</body>
</html>
