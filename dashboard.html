<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Hub — Media Omni</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%232563EB'/><stop offset='100%25' stop-color='%2306B6D4'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='50%25' y='56%25' dominant-baseline='central' text-anchor='middle' font-size='14' font-weight='900' fill='white' font-family='Arial'>M</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

<div id="sp"></div>

<!-- NAV -->
<nav id="main-nav" class="dash-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <span class="nav-logo-mark">MO</span>MediaOmni
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">← Trang chủ</a>
      <span class="role-badge" id="role-badge"></span>
      <span style="font-size:.84rem;color:rgba(255,255,255,.7);font-weight:500" id="user-name"></span>
      <button class="nav-cta" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3)" onclick="doLogout()">Đăng xuất</button>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
  <div class="nav-mob" id="nav-mob">
    <a href="/" class="nav-mob-link">← Trang chủ</a>
    <button class="nav-mob-link" onclick="doLogout()">Đăng xuất</button>
  </div>
</nav>
<div class="mob-overlay" id="mob-overlay"></div>

<!-- CONTENT -->
<div class="dash-page">
  <div class="dash-content">
    <div class="welcome-block">
      <div class="wb-left">
        <h1 id="welcome-title">Xin chào 👋</h1>
        <p id="welcome-sub"></p>
      </div>
      <div class="wb-right"><svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="url(#rg)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 00-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 012-3.95A12.88 12.88 0 0122 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 01-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg></div>
    </div>

    <div class="dash-cards" id="dash-cards"></div>

    <!-- Scores section (admin) -->
    <div class="scores-section" id="scores-section" style="display:none">
      <div class="scores-hdr">
        <h2 style="display:flex;align-items:center;gap:8px"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg> Bảng điểm Quiz Team</h2>
        <button class="btn-sm" onclick="clearScores()">Xóa toàn bộ dữ liệu</button>
      </div>
      <div class="scores-table">
        <div class="st-head">
          <span>Thành viên</span><span>Chủ đề</span><span>Điểm</span><span>%</span><span>Ngày làm</span>
        </div>
        <div id="scores-body"><div class="no-data">Chọn "Bảng điểm Team" để xem.</div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script src="/js/shared.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
