<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý tài khoản — Media Omni</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/css/users.css">
</head>
<body>
<div id="sp"></div>
<nav id="main-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span class="nav-logo-mark">MO</span>MediaOmni</a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link">← Dashboard</a>
      <span style="font-family:var(--f-mono);font-size:.65rem;font-weight:700;padding:.25rem .65rem;border-radius:var(--r-pill);background:rgba(239,68,68,.1);color:var(--error)">Admin Only</span>
    </div>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
  </div>
  <div class="nav-mob" id="nav-mob">
    <a href="/dashboard" class="nav-mob-link">← Dashboard</a>
  </div>
</nav>
<div class="mob-overlay" id="mob-overlay"></div>

<div class="users-wrap">
  <div class="users-hdr">
    <div>
      <h1>Quản lý tài khoản</h1>
      <p>Phân quyền tính năng cho từng thành viên Media Omni.</p>
    </div>
    <button class="btn-primary" onclick="openCreate()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Tạo tài khoản
    </button>
  </div>

  <div class="um-layout">
    <!-- LEFT: User list -->
    <div class="um-left">
      <div class="um-search-wrap">
        <input class="um-search" id="um-search" type="text" placeholder="Tìm thành viên..." oninput="filterUsers()">
      </div>
      <div class="um-filter-row">
        <button class="umf active" onclick="setUFilter('ALL',this)">Tất cả</button>
        <button class="umf" onclick="setUFilter('admin',this)">Admin</button>
        <button class="umf" onclick="setUFilter('member',this)">Member</button>
      </div>
      <div class="um-user-list" id="um-user-list">
        <div class="um-loading">⏳ Đang tải...</div>
      </div>
    </div>

    <!-- RIGHT: Detail + Permissions -->
    <div class="um-right" id="um-right">
      <div class="um-empty-state">
        <div class="ue-ico">👆</div>
        <div class="ue-title">Chọn thành viên</div>
        <div class="ue-sub">Nhấn vào tên bên trái để xem và chỉnh sửa quyền</div>
      </div>
    </div>
  </div>

  <!-- CREATE MODAL -->
  <div class="um-modal-overlay" id="create-modal">
    <div class="um-modal">
      <div class="um-modal-hdr">
        <h3 id="modal-title">Tạo tài khoản mới</h3>
        <button class="um-modal-close" onclick="closeCreate()">✕</button>
      </div>
      <div class="fp-grid">
        <div class="fp-full"><label class="fp-label">Họ và tên *</label><input class="fp-input" id="f-name" type="text" placeholder="Nguyễn Văn A"></div>
        <div><label class="fp-label">Username *</label><input class="fp-input" id="f-username" type="text" placeholder="nguyenvana" autocomplete="off"></div>
        <div><label class="fp-label">Mật khẩu</label><input class="fp-input" id="f-pass" type="password" placeholder="Mật khẩu *" autocomplete="new-password"></div>
        <div><label class="fp-label">Role</label>
          <select class="fp-input" id="f-role">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
            <option value="upbase">UpBase</option>
          </select>
        </div>
        <div><label class="fp-label">Trạng thái</label>
          <select class="fp-input" id="f-status">
            <option value="active">Active</option>
            <option value="disabled">Disabled</option>
          </select>
        </div>
      </div>
      <div class="fp-actions">
        <button class="fp-cancel" onclick="closeCreate()">Huỷ</button>
        <button class="fp-submit" id="f-submit" onclick="saveUser()">Tạo tài khoản →</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="/js/shared.js"></script>
<script src="/js/users.js"></script>
</body>
</html>
