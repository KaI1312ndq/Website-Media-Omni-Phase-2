<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Generate Favicon — Media Omni</title>
<style>
  body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; margin: 0; background: #f1f5f9; gap: 24px; }
  h2 { color: #1e293b; margin: 0; }
  .previews { display: flex; gap: 20px; align-items: flex-end; }
  .preview-item { text-align: center; }
  .preview-item span { display: block; font-size: 12px; color: #64748b; margin-top: 6px; }
  canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(37,99,235,.25); display: block; }
  .btns { display: flex; gap: 12px; }
  button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
           cursor: pointer; transition: opacity .2s; }
  .dl-512 { background: linear-gradient(135deg, #2563eb, #06b6d4); color: #fff; }
  .dl-192 { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; }
  .dl-32  { background: linear-gradient(135deg, #059669, #10b981); color: #fff; }
  button:hover { opacity: .85; }
  .note { font-size: 13px; color: #64748b; max-width: 500px; text-align: center; line-height: 1.6;
          background: #fff; padding: 16px 20px; border-radius: 10px; border: 1px solid #e2e8f0; }
  .note a { color: #2563eb; }
  .note strong { color: #1e293b; }
</style>
</head>
<body>

<h2>Media Omni — Favicon Generator</h2>

<div class="previews">
  <div class="preview-item">
    <canvas id="c512" width="512" height="512"></canvas>
    <span>512×512</span>
  </div>
  <div class="preview-item">
    <canvas id="c192" width="192" height="192" style="border-radius:8px"></canvas>
    <span>192×192</span>
  </div>
  <div class="preview-item">
    <canvas id="c32" width="32" height="32" style="border-radius:4px"></canvas>
    <span>32×32</span>
  </div>
</div>

<div class="btns">
  <button class="dl-512" onclick="download(512)">⬇ Download 512px (upload to favicon gen)</button>
  <button class="dl-192" onclick="download(192)">⬇ Download 192px</button>
  <button class="dl-32"  onclick="download(32)">⬇ Download 32px</button>
</div>

<div class="note">
  <strong>Cách dùng sau khi download:</strong><br>
  1. Tải file <strong>favicon-512.png</strong> ở trên<br>
  2. Vào <a href="https://realfavicongenerator.net" target="_blank">realfavicongenerator.net</a>
     → Upload ảnh 512px → Generate<br>
  3. Download package → lấy <strong>favicon.ico</strong> bỏ vào thư mục gốc repo<br>
  4. Commit &amp; push → xong ✓
</div>

<script>
function drawLogo(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.22; // border radius

  // Rounded rect clip
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.clip();

  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0,   '#2563EB');
  grad.addColorStop(0.5, '#1d4ed8');
  grad.addColorStop(1,   '#06B6D4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, s, s);

  // Subtle inner glow
  const glow = ctx.createRadialGradient(s*0.3, s*0.25, 0, s*0.5, s*0.5, s*0.7);
  glow.addColorStop(0, 'rgba(255,255,255,0.18)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, s, s);

  // Text "MO"
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const fontSize = s * 0.38;
  ctx.font = `900 ${fontSize}px Arial, sans-serif`;

  // Slight letter-spacing effect: draw M and O separately
  const gap = s * 0.015;
  ctx.fillText('M', s * 0.5 - s * 0.13 - gap, s * 0.515);
  ctx.fillText('O', s * 0.5 + s * 0.13 + gap, s * 0.515);
}

function download(size) {
  const c = document.getElementById('c' + size);
  const link = document.createElement('a');
  link.download = `favicon-${size}.png`;
  link.href = c.toDataURL('image/png');
  link.click();
}

// Draw on all canvases
['c512','c192','c32'].forEach(id => drawLogo(document.getElementById(id)));
</script>
</body>
</html>
